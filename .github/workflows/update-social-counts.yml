name: Update Social Counts

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch & write counts
        env:
          # ── Auto-fetched ──────────────────────────────────────────────
          # Go to https://developer.twitter.com → create a free app → copy Bearer Token
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_USERNAME: pachaboul

          # ── Manual – update these secrets in:
          #    GitHub repo → Settings → Secrets and variables → Actions
          FB_FOLLOWERS:         ${{ secrets.FB_FOLLOWERS }}
          LINKEDIN_CONNECTIONS: ${{ secrets.LINKEDIN_CONNECTIONS }}
          TIKTOK_FOLLOWERS:     ${{ secrets.TIKTOK_FOLLOWERS }}

        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.error

          path = 'json/social-counts.json'

          # Load existing counts so we never overwrite with empty
          try:
              with open(path) as f:
                  counts = json.load(f)
          except Exception:
              counts = {"twitter": 0, "facebook": 0, "linkedin": 0, "tiktok": 0}

          # ── Twitter / X  (auto-fetch via API v2) ──────────────────────
          token    = os.environ.get('TWITTER_BEARER_TOKEN', '').strip()
          username = os.environ.get('TWITTER_USERNAME', 'pachaboul').strip()
          if token:
              url = f'https://api.twitter.com/2/users/by/username/{username}?user.fields=public_metrics'
              req = urllib.request.Request(url, headers={'Authorization': f'Bearer {token}'})
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      data = json.loads(r.read())
                  counts['twitter'] = data['data']['public_metrics']['followers_count']
                  print(f"Twitter followers: {counts['twitter']}")
              except Exception as e:
                  print(f"Twitter fetch failed: {e}")
          else:
              print("TWITTER_BEARER_TOKEN not set — skipping Twitter fetch")

          # ── Manual counts from secrets ────────────────────────────────
          for key, env_var in [
              ('facebook', 'FB_FOLLOWERS'),
              ('linkedin', 'LINKEDIN_CONNECTIONS'),
              ('tiktok',   'TIKTOK_FOLLOWERS'),
          ]:
              val = os.environ.get(env_var, '').strip()
              if val:
                  try:
                      counts[key] = int(val.replace(',', '').replace('.', ''))
                  except ValueError:
                      counts[key] = val   # store as-is if not a plain number
                  print(f"{key}: {counts[key]}")
              else:
                  print(f"{env_var} not set — keeping existing value ({counts.get(key, 0)})")

          with open(path, 'w') as f:
              json.dump(counts, f, indent=2)

          print(f"\nFinal counts: {counts}")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/social-counts.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update social follower counts [skip ci]"
            git push
          fi
